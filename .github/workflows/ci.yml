name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.23']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Install dependencies
        run: go mod download

      - name: Build
        run: CGO_ENABLED=1 go build -tags "fts5" -o bin/goldlion ./cmd/goldlion

      - name: Test
        run: CGO_ENABLED=1 go test -tags "fts5" -race -coverprofile=coverage.out ./internal/...

      - name: Binary size check
        run: |
          SIZE=$(du -m bin/goldlion | cut -f1)
          echo "Binary size: ${SIZE}MB"
          if [ "$SIZE" -gt 50 ]; then
            echo "❌ Binary too large (>50MB)"
            exit 1
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Check for hardcoded secrets
        run: |
          # 检查是否有硬编码密钥
          if grep -rn "sk-[a-zA-Z0-9]\{20,\}" --include="*.go" .; then
            echo "❌ Hardcoded API key detected"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Format check
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "❌ Unformatted files:"
            echo "$UNFORMATTED"
            exit 1
          fi
          echo "✅ All files formatted"

      - name: Vet
        run: go vet -tags "fts5" ./...
