name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: true

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc libc6-dev libsqlite3-dev

    - name: Go mod tidy
      run: |
        go mod tidy
        git diff --exit-code

    - name: Run gofmt
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Go code is not formatted:"
          gofmt -d .
          exit 1
        fi

    - name: Install govulncheck
      run: go install golang.org/x/vuln/cmd/govulncheck@latest

    - name: Run govulncheck
      run: govulncheck ./...

    - name: Go vet
      env:
        CGO_ENABLED: 1
      run: go vet -tags "fts5" ./...

    - name: Run tests
      env:
        CGO_ENABLED: 1
      run: go test -v -race -tags "fts5" ./...

    - name: Build
      env:
        CGO_ENABLED: 1
      run: go build -tags "fts5" -o bin/lionclaw ./cmd/lionclaw
